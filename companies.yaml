# Serverless ATS Job Sniper — Company Registry
#
# Schema:
#   - name:      Display name shown in Discord notifications.
#     ats:       One of: greenhouse | lever | ashby | workday | tier3_todo
#     slug:      Company slug for Greenhouse/Lever/Ashby endpoints.
#     category:  frontier_ai | quant | enterprise | robotics | biotech | big_tech
#     # Workday-specific:
#     tenant:    Workday tenant subdomain.
#     wd_pod:    Workday pod (wd1, wd3, wd5, etc.) — check the careers URL.
#     site:      External career site identifier in the URL path.
#     note:      (optional) Free-form note (used for tier3_todo entries).
#
# Slugs are best-effort guesses. Run `python discovery.py` before relying on
# them — it pings every endpoint and reports broken entries to fix.
# Tier-3 entries are tracked but skipped by the orchestrator until custom
# adapters are written.

