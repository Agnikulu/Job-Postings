# Serverless ATS Job Sniper — Company Registry
#
# Schema:
#   - name:      Display name shown in Discord notifications.
#     ats:       greenhouse | lever | ashby | workday | workable | jibe |
#                rippling | gem | uber | smartrecruiters | tier3_todo
#     slug:      Company slug for Greenhouse/Lever/Ashby/Workable/Gem/Rippling.
#     careers_host: (jibe) Hostname for Jibe-powered career sites.
#     locale:    (uber) Locale code for the careers search API (default: en).
#     category:  frontier_ai | quant | enterprise | robotics | biotech | big_tech
#     # Workday-specific:
#     tenant:    Workday tenant subdomain.
#     wd_pod:    Workday pod (wd1, wd3, wd5, etc.) — check the careers URL.
#     site:      External career site identifier in the URL path.
#     note:      (optional) Free-form note (used for tier3_todo entries).
#
# All non-tier3 entries below have been verified via discovery.py against the
# live ATS endpoints. Tier-3 entries (custom careers sites) are tracked for
# future expansion but skipped by the orchestrator.

