name: ATS Sniper

on:
  schedule:
    # Hourly. GitHub Actions free-tier crons are best-effort and typically
    # run with ~5-20 min jitter (sometimes more during platform peaks).
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ats-sniper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PYTHONUNBUFFERED: "1"
          ATS_SNIPER_FETCH_WORKERS: "4"
          # Keep hourly runs inside the job budget (Google can return ~4k jobs at 200 pages).
          ATS_SNIPER_MAX_LIST_PAGES: "60"
          ATS_SNIPER_MAX_JOBS_PER_COMPANY: "1200"
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.name "ats-sniper-bot"
          git config user.email "ats-sniper-bot@users.noreply.github.com"
          git fetch origin main
          git add seen_jobs.json company_stats.json jobs_archive.json latest_jobs.md README.md
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update state files [skip ci]"
            # Rebase onto latest main if a human push landed during the long scrape.
            git pull --rebase origin main
            git push origin main
          fi
